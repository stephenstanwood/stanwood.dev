<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>baby brother ✦</title>
<style>
  :root {
    --bg: #f6f1e7;
    --ink: #1a1a1a;
    --accent: #e84a27;
    --green: #2d8a52;
    --paper: #fffaf0;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: Georgia, "Times New Roman", serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 16px 28px;
    -webkit-user-select: none;
    user-select: none;
  }
  header {
    width: 100%;
    max-width: 440px;
    text-align: center;
    margin-bottom: 10px;
  }
  h1 {
    font-size: 22px;
    margin: 0;
    font-style: italic;
    font-weight: 700;
  }
  h1 .star { color: var(--accent); font-style: normal; }
  .topbar {
    width: 100%;
    max-width: 440px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    font-family: "Courier New", monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    gap: 8px;
  }
  .topbar .counter { opacity: .6; flex: 1; text-align: center; }
  .pill {
    background: var(--paper);
    border: 1.5px solid var(--ink);
    font-family: inherit;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--ink);
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 999px;
    font-weight: 700;
    white-space: nowrap;
  }
  #stage { width: 100%; max-width: 440px; display: flex; justify-content: center; }
  .card {
    width: 100%;
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 14px;
    box-shadow: 5px 5px 0 var(--ink);
    padding: 30px 24px;
    min-height: 320px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    gap: 18px;
  }
  .name {
    font-size: clamp(44px, 12vw, 68px);
    line-height: 1;
    font-weight: 700;
    margin: 0;
    letter-spacing: -1px;
    word-break: break-word;
  }
  .meaning {
    font-size: 15px;
    opacity: .7;
    font-style: italic;
    line-height: 1.4;
  }
  .controls {
    display: flex;
    justify-content: center;
    gap: 36px;
    margin-top: 22px;
  }
  .btn {
    width: 76px; height: 76px;
    border-radius: 50%;
    border: 2px solid var(--ink);
    background: var(--paper);
    box-shadow: 4px 4px 0 var(--ink);
    font-size: 34px;
    cursor: pointer;
    font-family: inherit;
    display: flex; align-items: center; justify-content: center;
  }
  .btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--ink); }
  .btn.no { color: var(--accent); }
  .btn.yes { color: var(--green); }
  .done {
    padding: 60px 20px;
    text-align: center;
    font-style: italic;
    font-size: 20px;
    opacity: .75;
  }

  /* picker screen */
  .picker {
    width: 100%;
    max-width: 440px;
    padding: 40px 16px;
    text-align: center;
  }
  .picker p {
    font-size: 14px;
    opacity: .7;
    margin: 0 0 26px;
    font-style: italic;
  }
  .picker-row {
    display: flex;
    gap: 16px;
    justify-content: center;
  }
  .picker-btn {
    flex: 1;
    background: var(--paper);
    border: 2px solid var(--ink);
    box-shadow: 5px 5px 0 var(--ink);
    border-radius: 14px;
    padding: 28px 16px;
    font-family: inherit;
    font-size: 24px;
    font-weight: 700;
    cursor: pointer;
    color: var(--ink);
  }
  .picker-btn:active { transform: translate(2px,2px); box-shadow: 3px 3px 0 var(--ink); }

  /* modal */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(26,26,26,.55);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 10;
  }
  .modal.open { display: flex; }
  .sheet {
    background: var(--paper);
    border: 2px solid var(--ink);
    box-shadow: 5px 5px 0 var(--ink);
    border-radius: 14px;
    padding: 20px;
    max-width: 440px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
  }
  .sheet h2 {
    font-style: italic;
    margin: 0 0 14px;
    font-size: 22px;
  }
  .section-label {
    font-family: "Courier New", monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    opacity: .6;
    margin: 14px 0 6px;
  }
  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    border: 1.5px solid var(--ink);
    border-radius: 8px;
    margin-bottom: 6px;
    background: var(--bg);
    gap: 10px;
  }
  .row.match { background: #e8f5ec; border-color: var(--green); }
  .row .n { font-size: 20px; font-weight: 700; }
  .row .m { font-size: 11px; opacity: .6; font-style: italic; text-align: right; flex-shrink: 1; min-width: 0; }
  .row .x {
    background: none; border: none; font-size: 16px;
    cursor: pointer; padding: 0 0 0 6px; color: var(--accent);
    font-family: inherit;
  }
  .empty {
    text-align: center;
    padding: 30px 10px;
    opacity: .6;
    font-style: italic;
    font-size: 14px;
  }
  .sheet-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
    gap: 8px;
  }
  .danger {
    background: var(--paper);
    border: 1.5px solid var(--accent);
    color: var(--accent);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 6px 10px;
    border-radius: 999px;
    font-family: inherit;
    cursor: pointer;
    font-weight: 700;
  }
</style>
</head>
<body>

<header>
  <h1>baby brother <span class="star">✦</span></h1>
</header>

<div class="topbar" id="topbar" style="display:none;">
  <button class="pill" id="whoBtn">— switch</button>
  <span class="counter" id="counter">—</span>
  <button class="pill" id="listBtn">the list</button>
</div>

<div id="stage"></div>

<div class="controls" id="controls" style="display:none;">
  <button class="btn no" id="noBtn" aria-label="pass">✕</button>
  <button class="btn yes" id="yesBtn" aria-label="like">♥</button>
</div>

<div class="modal" id="modal">
  <div class="sheet">
    <h2 id="sheetTitle">the list</h2>
    <div id="sheetBody"></div>
    <div class="sheet-foot">
      <button class="danger" id="resetBtn">reset me</button>
      <button class="pill" id="closeBtn">close</button>
    </div>
  </div>
</div>

<script>
(function() {
  "use strict";

  // ------- NAMES (v4: 200 normal/modern, none reused) -------
  var RAW = [
    ["Lucas","light"],["Jack","god is gracious"],["Alden","old friend"],
    ["Dylan","son of the sea"],["Jayden","thankful"],["Maverick","independent"],
    ["Cooper","barrel maker"],["Ryan","little king"],["Jordan","to flow down"],
    ["Hunter","one who hunts"],["Tucker","cloth softener"],["Max","greatest"],
    ["Zachary","the lord remembers"],["Damian","to tame"],["Mohamed","praised"],
    ["Maddox","son of Madoc"],["Brayden","broad hillside"],["Camden","winding valley"],
    ["Cody","helpful"],["Paxton","peaceful town"],["Drake","dragon"],
    ["Alejandro","defender"],["Marcos","warlike"],["Luis","famed warrior"],
    ["Matias","gift of god"],["Alan","handsome"],["Archer","bowman"],
    ["Bowen","son of Owen"],["Brady","broad meadow"],["Braxton","Brock's town"],
    ["Colton","coal town"],["Cade","round, barrel"],["Dallas","meadow dwelling"],
    ["Damien","to tame"],["Davis","son of David"],["Dexter","right-handed"],
    ["Dorian","gift"],["Eduardo","wealthy guardian"],["Esteban","crown"],
    ["Evander","good man"],["Francisco","free man"],["Gael","stranger"],
    ["Grady","noble"],["Gunner","bold warrior"],["Hayes","hedged area"],
    ["Jake","supplanter"],["Jameson","son of James"],["Jax","god has been gracious"],
    ["Jed","friend of god"],["Jayce","healer"],["Jensen","son of Jens"],
    ["Jett","jet black"],["Jorge","farmer"],["Jose","he will add"],
    ["Judson","son of Jud"],["Juan","god is gracious"],["Kaden","companion"],
    ["Kane","warrior"],["Kayden","companion"],["Keegan","little fiery one"],
    ["Kendrick","royal power"],["Kian","ancient"],["Kingston","king's town"],
    ["Kobe","supplanter"],["Kyle","narrow strait"],["Lane","small road"],
    ["Layton","settlement by the leek"],["Lennox","elm grove"],["Leonardo","brave lion"],
    ["Manuel","god is with us"],["Mario","warlike"],["Mathias","gift of god"],
    ["Miguel","who is like god"],["Milan","gracious"],["Nash","by the ash tree"],
    ["Noel","christmas"],["Omar","flourishing"],["Otis","wealthy"],
    ["Pablo","small, humble"],["Pedro","rock"],["Pierce","rock"],
    ["Porter","gatekeeper"],["Ricky","brave ruler"],["Raiden","thunder and lightning"],
    ["Ramon","wise protector"],["Reese","ardor"],["Reid","red-haired"],
    ["Ricardo","brave ruler"],["Rocco","rest"],["Rocky","rest"],
    ["Rodrigo","famous ruler"],["Ronin","masterless samurai"],["Salvador","savior"],
    ["Samir","evening companion"],["Sean","god is gracious"],["Shane","god is gracious"],
    ["Shawn","god is gracious"],["Skylar","scholar"],["Steven","crown"],
    ["Tanner","leather worker"],["Tatum","Tate's homestead"],["Terry","power of the tribe"],
    ["Thiago","supplanter"],["Titan","defender"],["Tobin","god is good"],
    ["Tony","priceless"],["Trent","traveler"],["Trey","three"],
    ["Turner","lathe worker"],["Uriel","god is my light"],["Valentino","strong, healthy"],
    ["Vance","marshland"],["Vaughn","small"],["Waylon","land by the road"],
    ["Weston","west town"],["Wilson","son of William"],["Yahir","enlightened"],
    ["Yusuf","he will add"],["Zander","defender"],["Zayn","beauty, grace"],
    ["Zeke","god strengthens"],["Zion","highest point"],["Alec","defender"],
    ["Alexis","defender"],["Alfie","elf counsel"],["Amari","eternal"],
    ["Amir","prince, commander"],["Anderson","son of Andrew"],["Angelo","angel, messenger"],
    ["Antonio","priceless"],["Armando","soldier"],["Armani","free man"],
    ["Axton","sword stone"],["Baylor","horse trainer"],["Benson","son of Ben"],
    ["Bentley","meadow with coarse grass"],["Bobby","bright fame"],["Braylon","son of Brayden"],
    ["Brett","from Brittany"],["Brock","badger"],["Bruno","brown"],
    ["Bryson","son of Brice"],["Caden","companion"],["Callan","battle, rock"],
    ["Campbell","crooked mouth"],["Cannon","church official"],["Case","treasure chest"],
    ["Casey","watchful"],["Cason","son of Cas"],["Cassian","hollow"],
    ["Chance","good fortune"],["Chandler","candle maker"],["Channing","young wolf"],
    ["Charlie","free man"],["Coen","bold counselor"],["Clay","mortal"],
    ["Clint","town on a hill"],["Coleman","dove"],["Colt","young horse"],
    ["Corey","hollow"],["Craig","rock"],["Crew","chariot"],["Cyril","lordly"],
    ["Dalton","valley town"],["Deacon","servant"],["Derek","ruler of the people"],
    ["Devin","poet"],["Devon","defender"],["Drew","manly"],["Duke","leader"],
    ["Edison","son of Edward"],["Elian","bright light"],["Emiliano","rival"],
    ["Enrique","home ruler"],["Ernesto","serious"],["Ezio","eagle"],
    ["Felipe","lover of horses"],["Fernando","bold journey"],["Fletcher","arrow maker"],
    ["Fisher","fisherman"],["Gerardo","spear brave"],["Gianni","god is gracious"],
    ["Giovanni","god is gracious"],["Hayden","fire"],["Heath","heathland"],
    ["Ibrahim","father of many"],["Ismael","god will hear"],["Jalen","calm"],
    ["Jabari","brave one"],["Kenji","second born"],["Kaleb","whole-hearted"],
    ["Kason","treasurer"],["Kenzo","wise, strong"],["Khalil","friend"],
    ["King","ruler"],["Legend","a story"],["Lennon","lover"],["Marlon","little hawk"],
    ["Mack","son of"],["Moses","drawn from water"]
  ];

  // dedupe by lowercase name
  var NAMES = [];
  var seenNames = {};
  for (var i = 0; i < RAW.length; i++) {
    var key = RAW[i][0].toLowerCase();
    if (seenNames[key]) continue;
    seenNames[key] = 1;
    NAMES.push({ name: RAW[i][0], meaning: RAW[i][1] });
  }
  var TOTAL = NAMES.length;

  // ------- STATE -------
  var LS_KEY = "bb.v8";
  var USERS = ["madeleine", "stephen"];

  // Names pre-seeded as mutual likes on a fresh slate. Empty = clean start.
  var SEED_LIKES = [];

  function seedIds() {
    var ids = [];
    for (var i = 0; i < SEED_LIKES.length; i++) {
      for (var j = 0; j < NAMES.length; j++) {
        if (NAMES[j].name === SEED_LIKES[i]) { ids.push(j); break; }
      }
    }
    return ids;
  }

  var state = loadState();

  function emptyUser() {
    var preLiked = seedIds();
    var skip = {};
    for (var i = 0; i < preLiked.length; i++) skip[preLiked[i]] = 1;
    var order = [];
    for (var k = 0; k < TOTAL; k++) {
      if (!skip[k]) order.push(k);
    }
    for (var j = order.length - 1; j > 0; j--) {
      var r = Math.floor(Math.random() * (j + 1));
      var t = order[j]; order[j] = order[r]; order[r] = t;
    }
    return { order: order, index: 0, liked: preLiked.slice(), passed: [] };
  }

  function freshState() {
    return {
      currentUser: null,
      users: {
        madeleine: emptyUser(),
        stephen: emptyUser()
      }
    };
  }

  function loadState() {
    try {
      var raw = localStorage.getItem(LS_KEY);
      if (raw) {
        var p = JSON.parse(raw);
        if (p && p.users && p.users.madeleine && p.users.stephen &&
            Array.isArray(p.users.madeleine.order) && Array.isArray(p.users.stephen.order)) {
          return p;
        }
      }
    } catch (e) {}
    return freshState();
  }

  function saveState() {
    try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) {}
  }

  // ------- DOM refs -------
  var stage = document.getElementById("stage");
  var topbar = document.getElementById("topbar");
  var controls = document.getElementById("controls");
  var counter = document.getElementById("counter");
  var whoBtn = document.getElementById("whoBtn");
  var listBtn = document.getElementById("listBtn");
  var modal = document.getElementById("modal");
  var sheetTitle = document.getElementById("sheetTitle");
  var sheetBody = document.getElementById("sheetBody");
  var closeBtn = document.getElementById("closeBtn");
  var resetBtn = document.getElementById("resetBtn");

  // ------- RENDER -------
  function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  function render() {
    stage.innerHTML = "";

    if (!state.currentUser) {
      topbar.style.display = "none";
      controls.style.display = "none";
      renderPicker();
      return;
    }

    topbar.style.display = "flex";
    whoBtn.textContent = capitalize(state.currentUser) + " ▾";

    var user = state.users[state.currentUser];
    counter.textContent = user.index + " / " + user.order.length;

    if (user.index >= user.order.length) {
      controls.style.display = "none";
      var done = document.createElement("div");
      done.className = "done";
      done.innerHTML = "all done, " + capitalize(state.currentUser) + ".<br/>you liked " + user.liked.length + " names.<br/><br/><button class='pill' id='openList2'>see the list →</button>";
      stage.appendChild(done);
      document.getElementById("openList2").onclick = openSheet;
      return;
    }

    controls.style.display = "flex";
    var nameObj = NAMES[user.order[user.index]];
    var card = document.createElement("div");
    card.className = "card";
    card.innerHTML = '<h2 class="name"></h2><div class="meaning"></div>';
    card.querySelector(".name").textContent = nameObj.name;
    card.querySelector(".meaning").textContent = nameObj.meaning;
    stage.appendChild(card);
  }

  function renderPicker() {
    var p = document.createElement("div");
    p.className = "picker";
    p.innerHTML =
      '<p>who\'s swiping?</p>' +
      '<div class="picker-row">' +
        '<button class="picker-btn" data-u="madeleine">Madeleine</button>' +
        '<button class="picker-btn" data-u="stephen">Stephen</button>' +
      '</div>';
    stage.appendChild(p);
    var btns = p.querySelectorAll(".picker-btn");
    for (var i = 0; i < btns.length; i++) {
      btns[i].addEventListener("click", function(e) {
        state.currentUser = e.currentTarget.getAttribute("data-u");
        saveState();
        render();
      });
    }
  }

  // ------- ACTIONS -------
  var busy = false;
  function decide(liked) {
    if (busy) return;
    if (!state.currentUser) return;
    var user = state.users[state.currentUser];
    if (user.index >= user.order.length) return;
    busy = true;
    var id = user.order[user.index];
    if (liked) {
      if (user.liked.indexOf(id) === -1) user.liked.push(id);
    } else {
      if (user.passed.indexOf(id) === -1) user.passed.push(id);
    }
    user.index++;
    saveState();
    render();
    setTimeout(function() { busy = false; }, 120);
  }

  document.getElementById("noBtn").addEventListener("click", function() { decide(false); });
  document.getElementById("yesBtn").addEventListener("click", function() { decide(true); });

  document.addEventListener("keydown", function(e) {
    if (modal.classList.contains("open")) return;
    if (!state.currentUser) return;
    if (e.key === "ArrowLeft") decide(false);
    else if (e.key === "ArrowRight") decide(true);
  });

  whoBtn.addEventListener("click", function() {
    state.currentUser = null;
    saveState();
    render();
  });

  // ------- LIST SHEET -------
  function openSheet() {
    if (!state.currentUser) return;
    var me = state.users[state.currentUser];
    var otherKey = state.currentUser === "madeleine" ? "stephen" : "madeleine";
    var other = state.users[otherKey];

    var myLikes = me.liked;
    var otherLikes = other.liked;
    var otherSet = {};
    for (var i = 0; i < otherLikes.length; i++) otherSet[otherLikes[i]] = 1;

    var matches = [];
    var onlyMine = [];
    for (var j = 0; j < myLikes.length; j++) {
      if (otherSet[myLikes[j]]) matches.push(myLikes[j]);
      else onlyMine.push(myLikes[j]);
    }

    sheetTitle.textContent = "the list";
    sheetBody.innerHTML = "";

    if (matches.length) {
      var label1 = document.createElement("div");
      label1.className = "section-label";
      label1.textContent = "✦ mutual likes (" + matches.length + ")";
      sheetBody.appendChild(label1);
      for (var m = 0; m < matches.length; m++) {
        sheetBody.appendChild(buildRow(matches[m], true, false));
      }
    }

    var label2 = document.createElement("div");
    label2.className = "section-label";
    label2.textContent = capitalize(state.currentUser) + "'s likes (" + onlyMine.length + ")";
    sheetBody.appendChild(label2);

    if (onlyMine.length === 0) {
      var e = document.createElement("div");
      e.className = "empty";
      e.textContent = "nothing yet";
      sheetBody.appendChild(e);
    } else {
      for (var n = 0; n < onlyMine.length; n++) {
        sheetBody.appendChild(buildRow(onlyMine[n], false, true));
      }
    }

    if (other.liked.length === 0) {
      var note = document.createElement("div");
      note.className = "empty";
      note.style.fontSize = "11px";
      note.textContent = "(" + capitalize(otherKey) + " hasn't swiped yet)";
      sheetBody.appendChild(note);
    }

    modal.classList.add("open");
  }

  function buildRow(id, isMatch, removable) {
    var n = NAMES[id];
    var row = document.createElement("div");
    row.className = "row" + (isMatch ? " match" : "");
    var html = '<span class="n"></span><span class="m"></span>';
    if (removable) html += '<button class="x" aria-label="remove">✕</button>';
    row.innerHTML = html;
    row.querySelector(".n").textContent = n.name;
    row.querySelector(".m").textContent = n.meaning;
    if (removable) {
      row.querySelector(".x").addEventListener("click", function() {
        var me = state.users[state.currentUser];
        var idx = me.liked.indexOf(id);
        if (idx !== -1) {
          me.liked.splice(idx, 1);
          saveState();
          openSheet();
          render();
        }
      });
    }
    return row;
  }

  listBtn.addEventListener("click", openSheet);
  closeBtn.addEventListener("click", function() { modal.classList.remove("open"); });
  modal.addEventListener("click", function(e) {
    if (e.target === modal) modal.classList.remove("open");
  });

  resetBtn.addEventListener("click", function() {
    if (!state.currentUser) return;
    if (!confirm("Reset " + capitalize(state.currentUser) + "'s swipes?")) return;
    state.users[state.currentUser] = emptyUser();
    saveState();
    modal.classList.remove("open");
    render();
  });

  render();
})();
</script>
</body>
</html>
