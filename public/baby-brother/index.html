}));

  const k = n.name.toLowerCase();
  if (seen.has(k)) continue;
  seen.add(k);
  UNIQUE.push(n);

// ---------- STATE ----------
const LS_KEY = "babynames.v3";
const defaultState = {
  currentUser: null,
  users: {}, // { name: { liked: [ids], rejected: [ids], order: [ids] } }
};
let state = load();

function load() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return structuredClone(defaultState);
    const parsed = JSON.parse(raw);
    return { ...structuredClone(defaultState), ...parsed };
  } catch {
    return structuredClone(defaultState);
  }
}
function save() { localStorage.setItem(LS_KEY, JSON.stringify(state)); }

function ensureUser(name) {
  if (!state.users[name]) {
    state.users[name] = { liked: [], rejected: [], order: shuffledIds() };
  }
  return state.users[name];
}

function shuffledIds() {
  const ids = UNIQUE.map(n => n.id);
  for (let i = ids.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [ids[i], ids[j]] = [ids[j], ids[i]];
  }
  return ids;
}

// ---------- LEARNING ----------
// Build weights from rejected/liked: liked tags +1, rejected -1.2
function scoreFor(user, name) {
  const weights = {};
  for (const id of user.liked) {
    const n = UNIQUE[id]; if (!n) continue;
    for (const t of n.tags) weights[t] = (weights[t] || 0) + 1;
  }
  for (const id of user.rejected) {
    const n = UNIQUE[id]; if (!n) continue;
    for (const t of n.tags) weights[t] = (weights[t] || 0) - 1.2;
  }
  let s = 0;
  for (const t of name.tags) s += (weights[t] || 0);
  return s;
}

function resortQueue(user) {
  const seenIds = new Set([...user.liked, ...user.rejected]);
  const remaining = UNIQUE.filter(n => !seenIds.has(n.id));
  remaining.sort((a, b) => scoreFor(user, b) - scoreFor(user, a) + (Math.random() - .5) * .4);
  user.order = remaining.map(n => n.id);
}

// ---------- RENDER ----------
const stage = document.getElementById("stage");
const whoBtn = document.getElementById("whoBtn");
const counter = document.getElementById("counter");
const matchesBtn = document.getElementById("matchesBtn");
const modal = document.getElementById("modal");
const sheetBody = document.getElementById("sheetBody");
const sheetTitle = document.getElementById("sheetTitle");
const closeSheet = document.getElementById("closeSheet");
const resetBtn = document.getElementById("resetBtn");

function render() {
  stage.innerHTML = "";

  if (!state.currentUser) {
    renderSetup();
    whoBtn.textContent = "— who?";
    counter.textContent = "";
    return;
  }
  const user = ensureUser(state.currentUser);
  whoBtn.textContent = state.currentUser + " ▾";

  const queue = user.order.filter(id => !user.liked.includes(id) && !user.rejected.includes(id));
  counter.textContent = (user.liked.length + user.rejected.length) + " / " + UNIQUE.length;

  if (queue.length === 0) {
    const d = document.createElement("div");
    d.className = "done";
    d.innerHTML = "you've seen them all.<br/><br/><button class='linkbtn' onclick='openMatches()'>see matches →</button>";
    stage.appendChild(d);
    return;
  }

  const wrap = document.createElement("div");
  wrap.className = "cardwrap";
  // render up to 3 cards stacked
  const slice = queue.slice(0, 3);
  // append back-to-front so the front card ends up last in DOM (on top)
  for (let i = slice.length - 1; i >= 0; i--) {
    wrap.appendChild(buildCard(UNIQUE[slice[i]], i));
  }
  stage.appendChild(wrap);

  const ctrl = document.createElement("div");
  ctrl.className = "controls";
  ctrl.innerHTML = `
    <button class="btn no" id="noBtn" title="pass">✕</button>
    <button class="btn yes" id="yesBtn" title="like">♥</button>
  `;
  stage.appendChild(ctrl);
  document.getElementById("noBtn").onclick = () => decideTop(false);
  document.getElementById("yesBtn").onclick = () => decideTop(true);

  // attach drag to front card
  const front = wrap.querySelector(".card:not(.back):not(.back2)");
  if (front) attachDrag(front);
}

function buildCard(n, depth) {
  const c = document.createElement("div");
  c.className = "card" + (depth === 1 ? " back" : depth === 2 ? " back2" : "");
  c.dataset.id = n.id;
  const tagHtml = n.tags
    .filter(t => ["classic","modern","biblical","nature","literary","vintage","unique","irish","italian","spanish","greek","hebrew","french","scandinavian","welsh","romance","celtic","persian","hawaiian","sanskrit","english","german","latin","scottish"].includes(t))
    .slice(0, 4)
    .map(t => `<span class="tag">${t}</span>`).join("");
  c.innerHTML = `
    <div class="stamp yes">LIKE</div>
    <div class="stamp no">NOPE</div>
    <div></div>
    <h2 class="name">${n.name}</h2>
    <div class="meaning">${n.meaning}</div>
    <div class="tags">${tagHtml}</div>
  `;
  return c;
}

// ---------- DRAG / SWIPE ----------
function attachDrag(card) {
  let startX = 0, startY = 0, dx = 0, dy = 0, dragging = false;
  const yesStamp = card.querySelector(".stamp.yes");
  const noStamp = card.querySelector(".stamp.no");
  const onDown = (e) => {
    dragging = true;
    const p = e.touches ? e.touches[0] : e;
    startX = p.clientX; startY = p.clientY;
    card.style.transition = "none";
  };
  const onMove = (e) => {
    if (!dragging) return;
    const p = e.touches ? e.touches[0] : e;
    dx = p.clientX - startX;
    dy = p.clientY - startY;
    const rot = dx / 18;
    card.style.transform = `translate(${dx}px, ${dy}px) rotate(${rot}deg)`;
    yesStamp.style.opacity = Math.max(0, Math.min(1, dx / 100));
    noStamp.style.opacity = Math.max(0, Math.min(1, -dx / 100));
  };
  const onUp = () => {
    if (!dragging) return;
    dragging = false;
    card.style.transition = "";
    const threshold = 110;
    if (dx > threshold) {
      flyOut(card, 1);
    } else if (dx < -threshold) {
      flyOut(card, -1);
    } else {
      card.style.transform = "";
      yesStamp.style.opacity = 0;
      noStamp.style.opacity = 0;
    }
  };
  card.addEventListener("mousedown", onDown);
  card.addEventListener("touchstart", onDown, { passive: true });
  window.addEventListener("mousemove", onMove);
  window.addEventListener("touchmove", onMove, { passive: true });
  window.addEventListener("mouseup", onUp);
  window.addEventListener("touchend", onUp);
}

function flyOut(card, dir) {
  card.style.transform = `translate(${dir * 600}px, 40px) rotate(${dir * 30}deg)`;
  card.style.opacity = 0;
  setTimeout(() => commit(+card.dataset.id, dir > 0), 280);
}

function decideTop(like) {
  const front = stage.querySelector(".card:not(.back):not(.back2)");
  if (!front) return;
  flyOut(front, like ? 1 : -1);
}

function commit(id, like) {
  const user = ensureUser(state.currentUser);
  if (like) user.liked.push(id);
  else user.rejected.push(id);
  // re-sort what's left based on updated weights every few decisions
  if ((user.liked.length + user.rejected.length) % 5 === 0) {
    resortQueue(user);
  }
  save();
  render();
}

// ---------- SETUP / USER SWITCH ----------
function renderSetup() {
  const s = document.createElement("div");
  s.className = "setup sheet";
  s.style.maxWidth = "340px";
  s.style.margin = "auto";
  const existing = Object.keys(state.users);
  s.innerHTML = `
    <h2 style="font-family:Georgia,serif;font-style:italic;margin:0 0 8px;">who's swiping?</h2>
    <div style="font-size:12px;opacity:.7;margin-bottom:10px;">enter your name — decisions are saved per person</div>
    <input id="nameInput" placeholder="your name" autocomplete="off" />
    <div><button id="goBtn">start swiping</button></div>
    ${existing.length ? `<div style="margin-top:18px;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;opacity:.6;">or pick saved</div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:8px;">
        ${existing.map(u => `<button class="linkbtn" data-u="${u}" style="border:1.5px solid var(--ink);border-radius:999px;padding:6px 12px;text-decoration:none;">${u}</button>`).join("")}
      </div>` : ""}
  `;
  stage.appendChild(s);
  const input = document.getElementById("nameInput");
  input.focus();
  const go = () => {
    const v = input.value.trim();
    if (!v) return;
    state.currentUser = v;
    ensureUser(v);
    save();
    render();
  };
  document.getElementById("goBtn").onclick = go;
  input.addEventListener("keydown", e => { if (e.key === "Enter") go(); });
  s.querySelectorAll("[data-u]").forEach(b => {
    b.onclick = () => { state.currentUser = b.dataset.u; save(); render(); };
  });
}

whoBtn.onclick = () => {
  state.currentUser = null;
  save();
  render();
};

// ---------- MATCHES SHEET ----------
function openMatches() {
  sheetTitle.textContent = "the list";
  const users = Object.keys(state.users);
  const currentLiked = state.currentUser ? new Set(state.users[state.currentUser].liked) : new Set();
  const otherUsers = users.filter(u => u !== state.currentUser);

  // matches = names liked by current user AND all other users that have swiped any
  const matchIds = [...currentLiked].filter(id =>
    otherUsers.every(u => state.users[u].liked.includes(id))
  );

  // also show current user's likes
  const onlyMine = [...currentLiked].filter(id => !matchIds.includes(id));

  let html = "";
  if (users.length < 2) {
    html += `<div class="empty">once ${state.currentUser || "you"} and someone else both swipe, mutual likes show up here.</div>`;
  }
  if (matchIds.length) {
    html += `<div style="font-size:11px;text-transform:uppercase;letter-spacing:1.5px;margin:6px 0;">✦ mutual likes (${matchIds.length})</div>`;
    html += `<div class="matchlist">` + matchIds.map(id => {
      const n = UNIQUE[id];
      return `<div class="matchrow match"><span class="n">${n.name}</span><span class="k">${n.meaning}</span></div>`;
    }).join("") + `</div>`;
  }
  if (onlyMine.length) {
    html += `<div style="font-size:11px;text-transform:uppercase;letter-spacing:1.5px;margin:16px 0 6px;">${state.currentUser}'s picks (${onlyMine.length})</div>`;
    html += `<div class="matchlist">` + onlyMine.map(id => {
      const n = UNIQUE[id];
      return `<div class="matchrow"><span class="n">${n.name}</span><span class="k">${n.meaning}</span></div>`;
    }).join("") + `</div>`;
  }
  if (!matchIds.length && !onlyMine.length) {
    html += `<div class="empty">no likes yet.</div>`;
  }
  sheetBody.innerHTML = html;
  modal.classList.add("open");
}

matchesBtn.onclick = openMatches;
closeSheet.onclick = () => modal.classList.remove("open");
modal.addEventListener("click", e => { if (e.target === modal) modal.classList.remove("open"); });

resetBtn.onclick = () => {
  if (!state.currentUser) return;
  if (!confirm("reset " + state.currentUser + "'s swipes?")) return;
  state.users[state.currentUser] = { liked: [], rejected: [], order: shuffledIds() };
  save();
  modal.classList.remove("open");
  render();
};

// keyboard shortcuts
window.addEventListener("keydown", e => {
  if (modal.classList.contains("open")) return;
  if (e.key === "ArrowLeft") decideTop(false);
  if (e.key === "ArrowRight") decideTop(true);
});

render();
</script>
</body>
