<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="50%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#c850c0"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="#0f0c29"/>
  <!-- TV/monitor shape -->
  <rect x="24" y="30" width="80" height="56" rx="8" fill="none" stroke="url(#g)" stroke-width="5"/>
  <!-- Screen content: play button -->
  <polygon points="56,48 56,72 76,60" fill="url(#g)"/>
  <!-- Stand -->
  <line x1="52" y1="86" x2="76" y2="86" stroke="url(#g)" stroke-width="4" stroke-linecap="round"/>
  <line x1="64" y1="86" x2="64" y2="96" stroke="url(#g)" stroke-width="4" stroke-linecap="round"/>
</svg>
