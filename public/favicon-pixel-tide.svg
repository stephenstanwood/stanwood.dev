  <rect x="4" y="12" width="4" height="6" fill="#5BB5D5"/>
  <rect x="8" y="10" width="4" height="8" fill="#45A5C9"/>
  <rect x="12" y="12" width="4" height="6" fill="#2E86AB"/>
