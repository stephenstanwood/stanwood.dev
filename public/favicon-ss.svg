  <line x1="58" y1="34" x2="66" y2="52" stroke="#e85d4a" stroke-width="4" stroke-linecap="round"/>
  <line x1="74" y1="34" x2="82" y2="52" stroke="#e85d4a" stroke-width="4" stroke-linecap="round"/>
